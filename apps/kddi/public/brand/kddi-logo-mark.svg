<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KDDI mark">
  <!-- Recreated KDDI icon mark for demo visual fidelity (NOT the official asset). -->
  <title>KDDI mark</title>
  <defs>
    <linearGradient id="kddi-mark-swoosh" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="1" stop-color="#4a90d9" stop-opacity="0.6" />
    </linearGradient>
    <clipPath id="kddi-mark-clip">
      <text x="14" y="48" font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="46" font-weight="900" font-style="italic" transform="skewX(-6)">K</text>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0E0D6A" />
  <g transform="skewX(-6)">
    <text x="14" y="48" font-family="'Arial Black', Arial, Helvetica, sans-serif"
      font-size="46" font-weight="900" fill="#ffffff">K</text>
  </g>
  <g clip-path="url(#kddi-mark-clip)">
    <path d="M0 60 C 20 44, 44 60, 70 32 L 70 64 L 0 64 Z" fill="url(#kddi-mark-swoosh)" />
  </g>
</svg>
